version: "3.8"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        restart: unless-stopped
        working_dir: /var/www/atikstore
        volumes:
            - /var/www/atikstore
            - /var/www/atikstore/bootstrap/cache:/var/www/atikstore/bootstrap/cache
            - /var/www/atikstore/storage:/var/www/atikstore/storage

        environment:
            APP_ENV: production
            APP_DEBUG: "false"

            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: laravel
            DB_USERNAME: user
            DB_PASSWORD: password123
        depends_on:
            - db
        expose:
            - "9000"
        networks:
            - laravel

    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - /var/www/atikstore:/var/www/atikstore
            - /var/www/atikstore/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel

    db:
        image: mariadb:10.11
        container_name: laravel_db
        restart: unless-stopped
        environment:
            MARIADB_DATABASE: laravel
            MARIADB_USER: user
            MARIADB_PASSWORD: password123
            MARIADB_ROOT_PASSWORD: root123
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3306:3306"
        networks:
            - laravel

    n8n:
        image: docker.n8n.io/n8nio/n8n
        container_name: n8n
        restart: unless-stopped
        ports:
            - "5678:5678"
        environment:
            N8N_BASIC_AUTH_ACTIVE: "true"
            N8N_BASIC_AUTH_USER: admin
            N8N_BASIC_AUTH_PASSWORD: admin123
            N8N_HOST: srv1079713.hstgr.cloud
            N8N_PORT: 5678
            N8N_PROTOCOL: http
            WEBHOOK_URL: http://srv1079713.hstgr.cloud:5678/
            GENERIC_TIMEZONE: Asia/Jakarta
            N8N_SECURE_COOKIE: "false"
        volumes:
            - n8n_data:/home/node/.n8n
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    db_data:
    n8n_data:
